<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Exclusiva VIP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2a2a2a 0%, #050505 100%);
            font-family: 'Montserrat', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        .scene { perspective: 1200px; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        .wrapper { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; transition: transform 0.5s ease; }

        @media (max-width: 768px) { .wrapper { transform: scale(0.8); } }
        @media (max-width: 480px) { .wrapper { transform: scale(0.65); } }

        .envelope-container {
            position: relative; width: 400px; height: 250px; cursor: pointer;
            transition: transform 0.4s ease; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }

        .envelope-container.open { cursor: default; transform: none; }

        .hint-text {
            position: absolute; bottom: -50px; width: 100%; text-align: center;
            color: #d4af37; font-size: 12px; letter-spacing: 3px;
            text-transform: uppercase; animation: pulse 2s infinite; pointer-events: none;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 1; }
        .front-left { position: absolute; top: 0; left: 0; width: 200px; height: 250px; background: #1c1c1c; clip-path: polygon(0 0, 0 100%, 100% 50%); z-index: 3; }
        .front-right { position: absolute; top: 0; right: 0; width: 200px; height: 250px; background: #1c1c1c; clip-path: polygon(100% 0, 100% 100%, 0 50%); z-index: 3; }
        .front-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 150px; background: #151515; clip-path: polygon(0 100%, 100% 100%, 50% 0); z-index: 4; }

        .flap { position: absolute; top: 0; left: 0; width: 100%; height: 150px; transform-origin: top center; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5; transform-style: preserve-3d; }
        .flap-shape { width: 100%; height: 100%; background: #222; clip-path: polygon(0 0, 100% 0, 50% 100%); }
        .seal {
            position: absolute; bottom: -25px; left: 50%; margin-left: -30px; width: 60px; height: 60px;
            background: linear-gradient(135deg, #d4af37, #8a6519); border: 2px solid #f9df9f; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: #fff; font-family: 'Playfair Display', serif;
            font-weight: bold; font-size: 18px; animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ARREGLO DEL BOTÓN: Cambiado de altura fija a auto */
        .card {
            position: absolute; top: 10px; left: 10px; width: 380px; height: auto; min-height: 230px;
            background: #0a0a0a; z-index: 2; transition: transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: 4px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: visible; padding: 10px;
        }

        .card-border {
            border: 1px solid #c59d5f; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 15px; 
            text-align: center; box-sizing: border-box;
        }

        .logo-img { height: 55px; width: auto; margin: 4px 0; object-fit: contain; }
        .card .subtitle { font-size: 9px; color: #c59d5f; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 2px; font-weight: 600; }
        .card .divider { width: 50px; height: 1px; background: #c59d5f; margin: 6px 0; }
        .card .details { font-family: 'Playfair Display', serif; font-size: 11px; color: #d1d1d1; line-height: 1.4; margin: 0 0 8px 0; }
        .card .footer-info { display: flex; justify-content: space-between; width: 100%; margin: 6px 0; border-top: 1px solid #333; padding-top: 6px; }

        .info-block { display: flex; flex-direction: column; align-items: center; }
        .info-block .label { font-size: 7px; color: #888; letter-spacing: 1px; margin-bottom: 3px; }
        .info-block .value { font-size: 10px; font-weight: 600; color: #fdfbf7; }

        .rsvp-btn {
            background: #111; color: #d4af37; border: 1px solid #d4af37;
            padding: 8px 20px; font-family: 'Montserrat', sans-serif; font-size: 10px;
            font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
            margin-top: 10px;
        }

        .rsvp-btn:hover { background: #d4af37; color: #111; }
        .rsvp-form { display: none; width: 100%; margin-top: 10px; }
        .vip-input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #c59d5f;
            color: #fdfbf7; font-family: 'Montserrat', sans-serif; font-size: 11px;
            padding: 8px 0; margin-bottom: 6px; outline: none; box-sizing: border-box;
        }

        .hide-envelope .back, .hide-envelope .front-left, .hide-envelope .front-right, .hide-envelope .front-bottom, .hide-envelope .flap { opacity: 0; }
        .card.fullscreen { transform: translateY(-40px) scale(1.4); z-index: 10; }
    </style>
</head>
<body>

    <div class="scene">
        <div class="wrapper">
            <div class="envelope-container" id="envelope">
                <div class="hint-text" id="hint">Toca para descubrir</div>
                <div class="back"></div>
                
                <div class="card" id="card">
                    <div class="card-border">
                        <div class="subtitle">Lanzamiento</div>
                        <img src="logo.png" alt="Logo Origen" class="logo-img" onerror="this.src='https://placehold.co/150x45/0a0a0a/d4af37?text=ORIGEN'">
                        <div class="divider"></div>
                        <p class="details">Tenemos el honor de invitarte al lanzamiento de MVD Bohemia, un viaje en el tiempo donde la cultura se sienta en tu mesa.</p>
                        
                        <div class="footer-info">
                            <div class="info-block"><span class="label">FECHA</span><span class="value">14 AGO 2026</span></div>
                            <div class="info-block"><span class="label">HORARIO</span><span class="value">18:00</span></div>
                            <div class="info-block"><span class="label">LUGAR</span><span class="value">Café Brasilero</span></div>
                        </div>

                        <div class="rsvp-form" id="rsvp-form">
                            <input type="text" id="guest-name" class="vip-input" placeholder="Tu Nombre Completo" required>
                            <input type="email" id="guest-email" class="vip-input" placeholder="Tu Correo Electrónico" required>
                        </div>

                        <button class="rsvp-btn" id="rsvp-btn" onclick="confirmarAsistencia(event)">CONFIRMAR ASISTENCIA</button>
                    </div>
                </div>

                <div class="front-left"></div> <div class="front-right"></div> <div class="front-bottom"></div>
                <div class="flap" id="flap"><div class="flap-shape"></div><div class="seal">VIP</div></div>
            </div>
        </div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const flap = document.getElementById('flap');
        const card = document.getElementById('card');
        const hint = document.getElementById('hint');
        const rsvpBtn = document.getElementById('rsvp-btn');
        let isOpen = false;

        envelope.addEventListener('click', () => {
            if (isOpen) return; 
            isOpen = true;
            envelope.classList.add('open');
            hint.style.opacity = '0'; 
            flap.style.transform = 'rotateX(180deg)';
            setTimeout(() => {
                flap.style.zIndex = '1'; 
                card.style.transform = 'translateY(-170px)'; 
                card.style.zIndex = '6'; 
            }, 500);
            setTimeout(() => {
                envelope.classList.add('hide-envelope');
                card.classList.add('fullscreen');
            }, 1500);
        });

        // PEGA AQUÍ TU URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVsWI13er8imv0ZeQ6NqJtH0Of2fZ0cV_SKsk7NRIgGQRz9PrdrAjBZpe42nmwwAai/exec';

        function confirmarAsistencia(e) {
            const btn = e.target;
            const form = document.getElementById('rsvp-form');
            const nameInput = document.getElementById('guest-name');
            const emailInput = document.getElementById('guest-email');
            
            if (form.style.display !== 'block') {
                form.style.display = 'block';
                btn.innerHTML = "ENVIAR DATOS VIP";
                return; 
            }

            if (nameInput.value.trim() === '' || emailInput.value.trim() === '') {
                return;
            }

            btn.innerHTML = "PROCESANDO...";
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `nombre=${encodeURIComponent(nameInput.value)}&email=${encodeURIComponent(emailInput.value)}`
            })
            .then(() => {
                form.style.display = 'none';
                btn.innerHTML = "¡CONFIRMADO! ✔";
            })
            .catch(() => { btn.innerHTML = "ERROR, REINTENTAR"; });
        }
    </script>
</body>
</html>
</body>
</html>
